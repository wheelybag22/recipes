<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luke's Recipe Book</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1917;
    --bg2: #242220;
    --bg3: #2e2b28;
    --cream: #f0ebe0;
    --muted: rgba(240,235,224,0.4);
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --terra: #c4673a;
    --terra-light: #e8855a;
    --sage: #7a9e7e;
    --gold: #d4a853;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--cream); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }

  header { text-align: center; padding: 3rem 2rem 2rem; border-bottom: 0.5px solid var(--border); position: relative; }
  header::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 100%, rgba(196,103,58,0.08) 0%, transparent 70%); pointer-events: none; }
  header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 700; color: var(--cream); letter-spacing: -0.02em; position: relative; }
  header p { font-size: 0.8rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-top: 0.5rem; position: relative; }

  .toolbar { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 1rem 1.5rem; }
  .toolbar-inner { max-width: 780px; margin: 0 auto; display: flex; flex-direction: column; gap: 0.75rem; }
  .search-row { display: flex; gap: 0.75rem; align-items: center; }
  .search-wrap { position: relative; flex: 1; }
  .search-wrap input { width: 100%; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 8px; padding: 0.65rem 1rem 0.65rem 2.4rem; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--cream); outline: none; transition: border-color 0.2s; }
  .search-wrap input:focus { border-color: var(--terra); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
  .fav-toggle { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 8px; padding: 0.65rem 1rem; color: var(--muted); font-size: 0.85rem; font-family: 'DM Sans', sans-serif; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .fav-toggle.active { border-color: var(--gold); color: var(--gold); }
  .pills { display: flex; gap: 0.5rem; overflow-x: auto; scrollbar-width: none; }
  .pills::-webkit-scrollbar { display: none; }
  .pill { white-space: nowrap; padding: 0.3rem 0.8rem; border-radius: 999px; font-size: 0.78rem; font-weight: 500; cursor: pointer; border: 0.5px solid var(--border2); color: var(--muted); background: transparent; transition: all 0.18s; }
  .pill:hover, .pill.active { background: var(--terra); border-color: var(--terra); color: white; }

  main { max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }
  .recipe-count { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 1.75rem; text-transform: uppercase; }

  .category-section { margin-bottom: 2.5rem; }
  .category-heading { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
  .category-heading h3 { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--terra-light); white-space: nowrap; }
  .category-line { flex: 1; height: 0.5px; background: var(--border2); }

  .recipe-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 14px; margin-bottom: 0.75rem; overflow: hidden; transition: border-color 0.2s; }
  .recipe-card:hover { border-color: var(--border2); }
  .card-summary { display: flex; align-items: center; padding: 1rem 1.25rem; cursor: pointer; gap: 1rem; user-select: none; }
  .card-summary-text { flex: 1; min-width: 0; }
  .card-summary h2 { font-family: 'Playfair Display', serif; font-size: clamp(1rem, 2.5vw, 1.2rem); font-weight: 700; color: var(--cream); line-height: 1.2; }
  .card-summary p { font-size: 0.82rem; color: var(--muted); line-height: 1.5; font-style: italic; margin-top: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-actions { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
  .card-tag { background: rgba(196,103,58,0.15); color: var(--terra-light); font-size: 0.7rem; font-weight: 500; padding: 0.2rem 0.6rem; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
  .btn-icon { background: transparent; border: none; cursor: pointer; padding: 0.4rem; border-radius: 6px; font-size: 16px; line-height: 1; transition: background 0.15s; color: var(--muted); }
  .btn-icon:hover { background: var(--bg3); color: var(--cream); }
  .btn-icon.fav-active { color: var(--gold); }
  .btn-icon.expand-btn { font-size: 12px; }

  .card-body { display: none; padding: 1.25rem 1.25rem 1.5rem; border-top: 0.5px solid var(--border); }
  .card-body.open { display: block; }

  .scaler { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem; background: var(--bg3); border-radius: 8px; padding: 0.6rem 1rem; }
  .scaler label { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap; }
  .scaler-controls { display: flex; align-items: center; gap: 0.4rem; }
  .mult-btn { padding: 0.25rem 0.65rem; border-radius: 6px; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--muted); font-size: 0.8rem; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; }
  .mult-btn:hover { background: var(--bg3); color: var(--cream); }
  .mult-btn.active { background: var(--terra); border-color: var(--terra); color: white; }

  .section-label { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--terra-light); margin-bottom: 0.65rem; }

  .ingredient-table { width: 100%; border-collapse: collapse; margin-bottom: 1.25rem; }
  .ingredient-table th { background: var(--bg3); text-align: left; padding: 0.5rem 0.8rem; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .ingredient-table th:first-child { border-radius: 6px 0 0 6px; }
  .ingredient-table th:last-child { border-radius: 0 6px 6px 0; }
  .ingredient-table td { padding: 0.55rem 0.8rem; font-size: 0.87rem; border-bottom: 0.5px solid var(--border); color: var(--cream); }
  .ingredient-table tr:last-child td { border-bottom: none; }
  .ingredient-table td:last-child { color: var(--terra-light); font-weight: 500; }

  .steps { margin-bottom: 1.25rem; }
  .steps ol { list-style: none; counter-reset: steps; display: flex; flex-direction: column; gap: 0.75rem; }
  .steps ol li { counter-increment: steps; display: flex; gap: 0.85rem; align-items: flex-start; font-size: 0.88rem; line-height: 1.65; color: rgba(240,235,224,0.85); }
  .steps ol li::before { content: counter(steps); background: var(--terra); color: white; font-size: 0.68rem; font-weight: 500; min-width: 1.5rem; height: 1.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 0.1rem; }

  .notes ul { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.25rem; }
  .notes ul li { font-size: 0.84rem; line-height: 1.6; padding-left: 1rem; position: relative; color: var(--muted); }
  .notes ul li::before { content: '—'; position: absolute; left: 0; color: var(--sage); }

  .card-footer { display: flex; gap: 0.75rem; margin-top: 1.25rem; padding-top: 1rem; border-top: 0.5px solid var(--border); }
  .action-btn { flex: 1; padding: 0.55rem 1rem; border-radius: 8px; font-size: 0.82rem; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; border: 0.5px solid var(--border2); background: transparent; color: var(--muted); transition: all 0.18s; text-align: center; }
  .action-btn:hover { background: var(--bg3); color: var(--cream); }
  .action-btn.cook-btn:hover { border-color: var(--sage); color: var(--sage); }
  .action-btn.print-btn:hover { border-color: var(--terra-light); color: var(--terra-light); }

  .no-results { text-align: center; padding: 4rem 2rem; color: var(--muted); font-style: italic; display: none; }
  .favs-empty { display: none; text-align: center; padding: 3rem 2rem; color: var(--muted); font-style: italic; font-size: 0.9rem; }

  .cook-overlay { display: none; position: fixed; inset: 0; background: #111110; z-index: 1000; overflow-y: auto; padding: 2rem 1.5rem 4rem; }
  .cook-overlay.open { display: block; }
  .cook-inner { max-width: 680px; margin: 0 auto; }
  .cook-close { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2rem; cursor: pointer; color: var(--muted); font-size: 0.85rem; background: none; border: none; font-family: 'DM Sans', sans-serif; padding: 0; transition: color 0.2s; }
  .cook-close:hover { color: var(--cream); }
  .cook-title { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 700; color: var(--cream); margin-bottom: 2rem; line-height: 1.15; }
  .cook-section-label { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--terra-light); margin-bottom: 1rem; }
  .cook-ingredients { margin-bottom: 2.5rem; }
  .cook-ingredient { display: flex; justify-content: space-between; align-items: baseline; padding: 0.75rem 0; border-bottom: 0.5px solid var(--border); font-size: clamp(1rem, 2.5vw, 1.2rem); gap: 1rem; }
  .cook-ingredient:last-child { border-bottom: none; }
  .cook-ing-name { color: var(--cream); }
  .cook-ing-amt { color: var(--terra-light); font-weight: 500; white-space: nowrap; }
  .cook-steps { counter-reset: cook-steps; display: flex; flex-direction: column; gap: 1.5rem; }
  .cook-step { counter-increment: cook-steps; display: flex; gap: 1.25rem; align-items: flex-start; }
  .cook-step-num { font-family: 'Playfair Display', serif; font-size: clamp(1.5rem, 4vw, 2.5rem); font-weight: 700; color: var(--terra); line-height: 1; min-width: 2.5rem; flex-shrink: 0; }
  .cook-step-text { font-size: clamp(1rem, 2.5vw, 1.25rem); line-height: 1.7; color: rgba(240,235,224,0.9); padding-top: 0.2rem; }

  @media print {
    body { background: white !important; color: #1a1917 !important; }
    .toolbar, .card-footer, .scaler, .cook-overlay, .fav-toggle, .btn-icon, .recipe-count { display: none !important; }
    header { border-bottom: 1px solid #ddd !important; background: white !important; }
    header::before { display: none !important; }
    header h1 { color: #1a1917 !important; }
    header p { color: #666 !important; }
    .category-heading h3 { color: #c4673a !important; }
    .category-line { background: #ddd !important; }
    .recipe-card { background: white !important; border: 1px solid #ddd !important; border-radius: 0 !important; margin-bottom: 0 !important; break-inside: avoid; }
    .card-body { display: block !important; border-top: 1px solid #eee !important; background: white !important; }
    .card-summary { cursor: default !important; background: white !important; }
    .card-summary h2 { color: #1a1917 !important; }
    .card-summary p { color: #666 !important; white-space: normal !important; }
    .card-tag { background: #f0ede8 !important; color: #c4673a !important; }
    .ingredient-table th { background: #f5f5f5 !important; color: #666 !important; }
    .ingredient-table td { color: #1a1917 !important; border-bottom: 1px solid #eee !important; }
    .ingredient-table td:last-child { color: #c4673a !important; }
    .steps ol li { color: #1a1917 !important; }
    .steps ol li::before { background: #c4673a !important; }
    .notes ul li { color: #666 !important; }
    .section-label { color: #c4673a !important; }
    .bg3 { background: white !important; }
  }

  @media (max-width: 520px) {
    .card-summary { padding: 0.85rem 1rem; }
    .card-body { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Luke's Recipe Book</h1>
  <p>A personal collection of tried and true recipes</p>
</header>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">&#9906;</span>
        <input type="text" id="searchInput" placeholder="Search recipes or ingredients…" oninput="filterRecipes()">
      </div>
      <button class="fav-toggle" id="favToggle" onclick="toggleFavView()">&#9733; Favorites</button>
    </div>
    <div class="pills">
      <button class="pill active" onclick="filterByTag('all',this)">All</button>
      <button class="pill" onclick="filterByTag('chicken',this)">Chicken</button>
      <button class="pill" onclick="filterByTag('beef',this)">Beef</button>
      <button class="pill" onclick="filterByTag('soup',this)">Soup</button>
      <button class="pill" onclick="filterByTag('sauce',this)">Sauce</button>
      <button class="pill" onclick="filterByTag('condiment',this)">Condiment</button>
      <button class="pill" onclick="filterByTag('side',this)">Side</button>
      <button class="pill" onclick="filterByTag('marinade',this)">Marinade</button>
      <button class="pill" onclick="filterByTag('salad',this)">Salad</button>
      <button class="pill" onclick="filterByTag('vegetarian',this)">Vegetarian</button>
      <button class="pill" onclick="filterByTag('seafood',this)">Seafood</button>
    </div>
  </div>
</div>

<main>
  <div class="recipe-count" id="recipeCount">16 recipes</div>
  <div id="recipeSections"></div>
  <div class="no-results" id="noResults">No recipes found. Try a different search.</div>
  <div class="favs-empty" id="favsEmpty">No favorites yet — tap &#9733; on any recipe to save it here.</div>
</main>

<div class="cook-overlay" id="cookOverlay">
  <div class="cook-inner">
    <button class="cook-close" onclick="closeCookMode()">&#8592; Back to recipes</button>
    <div class="cook-title" id="cookTitle"></div>
    <div class="cook-ingredients" id="cookIngredients"></div>
    <div class="cook-section-label">Directions</div>
    <div class="cook-steps" id="cookSteps"></div>
  </div>
</div>

<script>
const recipes = [
  { id:1, title:"Chicken Fajita Seasoning", tag:"Chicken", category:"Mains & Sides", desc:"A bold, smoky blend for fajitas — enough to season about 1.5 lbs of chicken.", tags:"chicken weeknight", search:"chicken fajita seasoning chili powder cumin smoked paprika garlic powder onion powder oregano salt pepper cayenne", baseServings:4,
    ingredients:[
      ["Chili powder","tsp",2],["Cumin","tsp",1.5],["Smoked paprika","tsp",1],
      ["Garlic powder","tsp",1],["Onion powder","tsp",0.5],["Dried oregano","tsp",0.5],
      ["Salt","tsp",1],["Black pepper","tsp",0.5],["Cayenne pepper","tsp",0.25]
    ],
    steps:["Mix all spices together in a small bowl until evenly blended.","Pat chicken dry, then coat all sides generously with the seasoning mix. Let sit for 15–30 minutes before cooking.","Cook in a very hot cast iron or skillet with a little oil over high heat, about 5–6 minutes per side, until nicely charred and cooked through. Rest 5 minutes before slicing."],
    notes:["Heat level: Adjust cayenne up or down to taste. Double it for a real kick.","Big batch: Scale up and store in an airtight jar — keeps 6 months. Use about 1 tbsp per pound of chicken.","Marinade option: Mix seasoning with 2 tbsp olive oil and juice of 1 lime. Marinate chicken 1–4 hours for deeper flavor."]
  },
  { id:2, title:"Egg Roll In A Bowl", tag:"Beef", category:"Mains & Sides", desc:"Hearty, flavor-packed skillet dish with all the taste of egg rolls — no wrapper needed.", tags:"beef weeknight", search:"egg roll bowl ground beef cabbage green onions garlic ginger red bell pepper gochujang hoisin soy sauce sesame oil rice vinegar", baseServings:4,
    ingredients:[
      ["Lean ground beef","lb",1.5],["Fine shredded cabbage","oz bag",10],
      ["Red shredded cabbage","oz bag",10],["Green onions","bunch",1],
      ["Garlic cloves","cloves",6],["Minced ginger","tbsp",2],
      ["Red bell pepper","",1],["Gochujang","tbsp",1],
      ["Hoisin sauce","tbsp",3],["Soy sauce","cup",0.25],
      ["Toasted sesame oil","tsp",2],["Rice vinegar","tbsp",2]
    ],
    steps:["Brown the ground beef in a large skillet over medium-high heat.","While the beef cooks, thinly slice the red bell pepper, chop the green onions, and mince the garlic and ginger.","Drain the beef, return it to the pan, and add toasted sesame oil, rice vinegar, hoisin, gochujang, and soy sauce. Cook for 2–3 minutes.","Add both cabbages, bell pepper, green onions, garlic, and ginger. Stir to combine and cook until the veggies are tender and reduced, about 15–20 minutes."]
  },
  { id:3, title:"Barbacoa", tag:"Beef", category:"Mains & Sides", desc:"Smoky, tender slow-cooked chuck with chipotle and warm spices. Serve as tacos, burrito bowls, or with any toppings.", tags:"beef weeknight", search:"barbacoa chuck garlic chipotle peppers adobo green chiles beef stock white onion lime bay leaves apple cider vinegar cumin oregano black pepper salt ground cloves crock pot slow cooker tacos burrito bowl", baseServings:6,
    ingredients:[
      ["Chuck roast","lb",3],["Garlic cloves, minced","cloves",5],
      ["Chipotle peppers in adobo","",2],["Can of green chiles","oz can",4],
      ["Beef stock","cup",0.5],["White onion, chopped","",1],
      ["Limes, juiced","limes",2],["Bay leaves","",3],
      ["Apple cider vinegar","tbsp",2],["Cumin","tbsp",1],
      ["Oregano","tbsp",1],["Black pepper","tbsp",1],
      ["Salt","tsp",2],["Ground cloves","tsp",0.25]
    ],
    steps:["Cut chuck into cubes and sear over high heat until browned on all sides.","Add seared meat and all remaining ingredients to a crock pot. Cook on low 6–8 hours or high 3–4 hours, until the meat shreds easily with a fork.","Remove bay leaves, shred the meat, and stir to combine with the juices. Serve as tacos, burrito bowls, or with any toppings you like."]
  },
  { id:4, title:"Garlic Parm Chicken Skewers", tag:"Chicken", category:"Mains & Sides", desc:"Buffalo-marinated chicken skewers grilled and basted with a homemade garlic parmesan sauce.", tags:"chicken weeknight", search:"garlic parmesan chicken skewers buffalo sauce butter mayonnaise parmesan cheese apple cider vinegar lemon juice salt red pepper flakes oregano basil black pepper grill grilled", baseServings:4,
    ingredients:[
      ["Large chicken breasts","",5],["Buffalo sauce","cup",1],
      ["Butter","tbsp",2],["Head of garlic","head",1],
      ["Mayonnaise","cup",0.5],["Grated Parmesan cheese","oz",3],
      ["Apple cider vinegar","tbsp",1],["Lemon juice","tsp",1],
      ["Salt","tsp",0.5],["Red pepper flakes","tsp",0.25],
      ["Dried oregano","tsp",0.25],["Dried basil","tsp",0.25],
      ["Black pepper","tsp",0.25]
    ],
    steps:["Night before: Tenderize chicken breasts, then slice into thin strips cutting with the grain. Marinate in buffalo sauce overnight, or at least 4 hours.","Weave chicken strips onto skewers.","Mince the garlic. Melt butter in a saucepan and cook garlic for 1–2 minutes.","Combine cooked garlic with mayonnaise, Parmesan, vinegar, lemon juice, salt, red pepper flakes, oregano, basil, and black pepper. Whisk together and refrigerate until ready to use.","Grill skewers, rotating every 3–4 minutes, until cooked through — about 18–20 minutes total.","Baste garlic parm sauce onto chicken during the last few minutes of grilling."]
  },
  { id:5, title:"Alden Mill House Chicken Salad", tag:"Chicken", category:"Mains & Sides", desc:"Classic chicken salad with toasted pecans, red grapes, and a honey poppy seed dressing.", tags:"chicken salad", search:"chicken salad pecans red grapes celery mayo apple cider vinegar honey poppy seeds sandwich wrap lettuce", baseServings:4,
    ingredients:[
      ["Chicken breast","oz",32],["Pecans, toasted","oz",6],
      ["Seedless red grapes","cups",2],["Celery stalks, sliced","stalks",3],
      ["Mayonnaise","oz",8],["Apple cider vinegar","tsp",4],
      ["Honey","tsp",5],["Poppy seeds","tsp",2],
      ["Salt","",null],["Black pepper","",null]
    ],
    steps:["Make the dressing: whisk together mayo, vinegar, honey, poppy seeds, salt, and pepper. Refrigerate — can be made up to 2 days ahead.","Preheat oven to 350°F. Place chicken in a baking dish with ½ cup water, cover with foil, and bake 25 minutes until cooked through.","Remove chicken, cool slightly at room temperature, then chill completely in the refrigerator covered with plastic wrap.","Dice cold chicken into bite-size pieces and transfer to a large bowl. Combine with pecans, grapes, celery, and dressing.","Serve in a sandwich, wrap, or on a lettuce bed."]
  },
  { id:6, title:"Sweet Bourbon Mushrooms", tag:"Side", category:"Mains & Sides", desc:"The ultimate sweet and umami pairing for steak, pork, or just about anything. Caramelized golden brown in under 30 minutes.", tags:"vegetarian weeknight side", search:"sweet bourbon mushrooms butter balsamic vinegar soy sauce garlic powder sea salt black pepper cast iron skillet", baseServings:2,
    ingredients:[
      ["Unsalted butter","tbsp",1],["Mushrooms, sliced","cups",2],
      ["Bourbon","tbsp",3],["Balsamic vinegar","tbsp",1],
      ["Soy sauce","tsp",2],["Garlic powder","tsp",0.5],
      ["Sea salt","tsp",0.5],["Freshly ground black pepper","tsp",0.5]
    ],
    steps:["Preheat a cast-iron skillet over medium-high heat (350°F / 180°C). Add the butter 2 minutes before cooking.","Add the mushrooms and cook for 5–7 minutes, stirring occasionally, until they release their liquid and it has fully evaporated and the mushrooms are golden brown.","Add all remaining ingredients and cook for 3–4 minutes until the liquids have reduced and thickened. Pull the skillet off the heat and serve."]
  },
  { id:7, title:"Alden Mill House Hummus", tag:"Side", category:"Mains & Sides", desc:"Classic creamy hummus made in a food processor. Includes black bean and roasted red pepper variations.", tags:"vegetarian condiment side", search:"hummus garbanzo beans chickpeas tahini lemon juice olive oil garlic salt pepper cumin", baseServings:4,
    ingredients:[
      ["Garbanzo beans (canned)","oz",28],["Tahini","oz",4],
      ["Lemon juice","oz",3],["Extra virgin olive oil","oz",4],
      ["Fresh garlic, minced","oz",1],["Salt","",null],
      ["Black pepper","",null],["Cumin","tsp",2]
    ],
    steps:["Place all ingredients in a food processor and blend until smooth."],
    notes:["Black Bean: Substitute black beans for garbanzo beans, use lime juice instead of lemon (half the quantity), add ½ bunch cilantro and 1 tbsp curry powder.","Roasted Red Pepper: Add 2 roasted red peppers and ½ tsp cayenne pepper."]
  },
  { id:8, title:"Tomato Bisque", tag:"Soup", category:"Soups", desc:"A rich, roasted tomato bisque with sweet potato and Gruyère — deeply flavorful and silky smooth.", tags:"vegetarian soup", search:"tomato bisque roma tomatoes cherry tomatoes sweet potato red bell pepper gruyere cheese garlic thyme heavy cream chicken broth", baseServings:4,
    ingredients:[
      ["Roma tomatoes","",7],["Sugar bomb cherry tomatoes","pint",1],
      ["Small sweet potato, peeled & cubed","",1],["Red bell pepper","",1],
      ["Gruyère cheese","",null],["Fresh garlic cloves","cloves",7],
      ["Fresh thyme","stalks",3],["Heavy cream","oz",8],

let activeTag = 'all', favView = false;
let favorites = JSON.parse(localStorage.getItem('lrb_favs') || '[]');
let multipliers = {};
recipes.forEach(r => multipliers[r.id] = 1);

function saveFavs() { localStorage.setItem('lrb_favs', JSON.stringify(favorites)); }
function toggleFav(id, btn) {
  if (favorites.includes(id)) { favorites = favorites.filter(f => f !== id); btn.classList.remove('fav-active'); }
  else { favorites.push(id); btn.classList.add('fav-active'); }
  saveFavs(); if (favView) render();
}
function toggleFavView() { favView = !favView; document.getElementById('favToggle').classList.toggle('active', favView); render(); }
function filterByTag(tag, btn) { activeTag = tag; document.querySelectorAll('.pill').forEach(p => p.classList.remove('active')); btn.classList.add('active'); render(); }
function filterRecipes() { render(); }

function setMultiplier(id, mult) {
  multipliers[id] = mult;
  document.querySelectorAll(`.mult-btn[data-id="${id}"]`).forEach(b => {
    b.classList.toggle('active', parseFloat(b.dataset.mult) === mult);
  });
  const r = recipes.find(x => x.id === id);
  r.ingredients.forEach((ing, i) => {
    const el = document.getElementById('ing-' + id + '-' + i);
    if (el) el.textContent = scaledAmt(r, ing, mult);
  });
}

function formatNum(n) {
  const fracs = [[0.125,'⅛'],[0.25,'¼'],[0.333,'⅓'],[0.5,'½'],[0.667,'⅔'],[0.75,'¾']];
  const whole = Math.floor(n);
  const dec = Math.round((n - whole) * 1000) / 1000;
  if (dec === 0) return String(whole || '0');
  for (const [val, sym] of fracs) {
    if (Math.abs(dec - val) < 0.04) return (whole > 0 ? whole : '') + sym;
  }
  return (Math.round(n * 4) / 4).toString();
}

function formatAmt(val, unit) {
  if (val === null) return 'to taste';
  const v = Math.round(val * 1000) / 1000;
  if (unit === 'tsp') {
    if (v >= 3) return formatNum(v / 3) + ' tbsp';
    return formatNum(v) + ' tsp';
  }
  if (unit === 'tbsp') {
    if (v >= 4) return formatNum(v / 16) + ' cup';
    if (v >= 1) return formatNum(v) + ' tbsp';
    return formatNum(v * 3) + ' tsp';
  }
  if (unit === 'cup') {
    if (v < 0.25) return formatNum(v * 16) + ' tbsp';
    return formatNum(v) + ' cup';
  }
  if (unit === 'oz') { if (v >= 16) return formatNum(v / 16) + ' lb'; return formatNum(v) + ' oz'; }
  if (unit === 'lb') { if (v < 1) return formatNum(v * 16) + ' oz'; return formatNum(v) + ' lb'; }
  return formatNum(v) + (unit ? ' ' + unit : '');
}

function scaledAmt(r, ing, mult) {
  const [name, unit, base] = ing;
  if (base === null) return 'to taste';
  return formatAmt(base * mult, unit);
}

function openCookMode(id) {
  const r = recipes.find(x => x.id === id);
  const mult = multipliers[id];
  const label = mult === 0.5 ? '½x' : mult === 1 ? '1x' : mult + 'x';
  document.getElementById('cookTitle').textContent = r.title + (mult !== 1 ? ' (' + label + ')' : '');
  document.getElementById('cookIngredients').innerHTML = '<div class="cook-section-label">Ingredients</div>' +
    r.ingredients.map((ing,i) => `<div class="cook-ingredient"><span class="cook-ing-name">${ing[0]}</span><span class="cook-ing-amt">${scaledAmt(r,ing,mult)}</span></div>`).join('');
  let n = 1;
  document.getElementById('cookSteps').innerHTML = r.steps.map(s =>
    `<div class="cook-step"><div class="cook-step-num">${n++}</div><div class="cook-step-text">${s}</div></div>`).join('');
  document.getElementById('cookOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeCookMode() { document.getElementById('cookOverlay').classList.remove('open'); document.body.style.overflow = ''; }

function printRecipe(id) {
  const r = recipes.find(x => x.id === id);
  const mult = multipliers[id];
  const label = mult === 0.5 ? '½x' : mult === 1 ? '1x' : mult + 'x';
  const w = window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>${r.title}</title><style>
    body{font-family:Georgia,serif;max-width:600px;margin:2rem auto;color:#1a1917;}
    h1{font-size:2rem;margin-bottom:.25rem;}
    .scale-note{font-size:.8rem;color:#c4673a;margin-bottom:1.25rem;font-family:sans-serif;}
    .desc{font-style:italic;color:#666;margin-bottom:1.5rem;}
    h2{font-size:.85rem;text-transform:uppercase;letter-spacing:.1em;color:#c4673a;margin:1.5rem 0 .75rem;font-family:sans-serif;}
    table{width:100%;border-collapse:collapse;margin-bottom:1rem;}
    th{background:#f5f5f5;text-align:left;padding:.4rem .75rem;font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;font-family:sans-serif;}
    td{padding:.5rem .75rem;border-bottom:1px solid #eee;font-size:.95rem;}
    td:last-child{color:#c4673a;font-weight:bold;}
    ol{padding-left:1.5rem;}li{margin-bottom:.75rem;line-height:1.6;}
    ul{list-style:none;padding:0;}ul li{padding-left:1rem;position:relative;margin-bottom:.5rem;color:#555;font-size:.9rem;}
    ul li::before{content:'—';position:absolute;left:0;color:#7a9e7e;}
  </style></head><body>
  <h1>${r.title}</h1>
  ${mult !== 1 ? `<p class="scale-note">Scaled: ${label}</p>` : ''}
  <p class="desc">${r.desc}</p>
  <h2>Ingredients</h2>
  <table><thead><tr><th>Ingredient</th><th>Amount</th></tr></thead><tbody>
  ${r.ingredients.map((ing,i)=>`<tr><td>${ing[0]}</td><td>${scaledAmt(r,ing,mult)}</td></tr>`).join('')}
  </tbody></table>
  <h2>Directions</h2><ol>${r.steps.map(s=>`<li>${s}</li>`).join('')}</ol>
  ${r.notes?`<h2>Notes</h2><ul>${r.notes.map(n=>`<li>${n}</li>`).join('')}</ul>`:''}
  </body></html>`);
  w.document.close(); w.focus(); setTimeout(()=>w.print(),400);
}

function toggleCard(id) {
  const b = document.getElementById('body-'+id), e = document.getElementById('exp-'+id);
  const open = b.classList.toggle('open'); e.textContent = open ? '▲' : '▼';
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = recipes.filter(r =>
    (!q || (r.title+' '+r.search).toLowerCase().includes(q)) &&
    (activeTag==='all' || r.tags.includes(activeTag)) &&
    (!favView || favorites.includes(r.id))
  );
  document.getElementById('recipeCount').textContent = filtered.length + (filtered.length===1?' recipe':' recipes');
  document.getElementById('noResults').style.display = filtered.length===0 && !favView ? 'block':'none';
  document.getElementById('favsEmpty').style.display = filtered.length===0 && favView ? 'block':'none';

  const cats = {}, order = ['Mains & Sides','Soups','Sauces & Condiments'];
  filtered.forEach(r => { if(!cats[r.category]) cats[r.category]=[]; cats[r.category].push(r); });

  const el = document.getElementById('recipeSections');
  el.innerHTML = '';
  order.forEach(cat => {
    if (!cats[cat]) return;
    const sec = document.createElement('div');
    sec.className = 'category-section';
    sec.innerHTML = `<div class="category-heading"><h3>${cat}</h3><div class="category-line"></div></div>`;
    cats[cat].forEach(r => {
      const isFav = favorites.includes(r.id);
      const mult = multipliers[r.id];
      const ingRows = r.ingredients.map((ing,i) =>
        `<tr><td>${ing[0]}</td><td id="ing-${r.id}-${i}">${scaledAmt(r,ing,mult)}</td></tr>`
      ).join('');
      const steps = r.steps.map(s=>`<li>${s}</li>`).join('');
      const notes = r.notes ? `<div class="notes" style="margin-top:1rem"><div class="section-label">Notes</div><ul>${r.notes.map(n=>`<li>${n}</li>`).join('')}</ul></div>` : '';
      const card = document.createElement('div');
      card.className = 'recipe-card';
      card.innerHTML = `
        <div class="card-summary" onclick="toggleCard(${r.id})">
          <div class="card-summary-text"><h2>${r.title}</h2><p>${r.desc}</p></div>
          <div class="card-actions">
            <span class="card-tag">${r.tag}</span>
            <button class="btn-icon${isFav?' fav-active':''}" onclick="event.stopPropagation();toggleFav(${r.id},this)" title="${isFav?'Remove':'Add to favorites'}">&#9733;</button>
            <button class="btn-icon expand-btn" id="exp-${r.id}" onclick="event.stopPropagation();toggleCard(${r.id})">▼</button>
          </div>
        </div>
        <div class="card-body" id="body-${r.id}">
          <div class="scaler">
            <label>Scale</label>
            <div class="scaler-controls">
              <button class="mult-btn${mult===0.5?' active':''}" data-id="${r.id}" data-mult="0.5" onclick="setMultiplier(${r.id},0.5)">½x</button>
              <button class="mult-btn${mult===1?' active':''}" data-id="${r.id}" data-mult="1" onclick="setMultiplier(${r.id},1)">1x</button>
              <button class="mult-btn${mult===2?' active':''}" data-id="${r.id}" data-mult="2" onclick="setMultiplier(${r.id},2)">2x</button>
              <button class="mult-btn${mult===3?' active':''}" data-id="${r.id}" data-mult="3" onclick="setMultiplier(${r.id},3)">3x</button>
            </div>
          </div>
          <div class="section-label">Ingredients</div>
          <table class="ingredient-table"><thead><tr><th>Ingredient</th><th>Amount</th></tr></thead><tbody>${ingRows}</tbody></table>
          <div class="steps"><div class="section-label">Directions</div><ol>${steps}</ol></div>
          ${notes}
          <div class="card-footer">
            <button class="action-btn cook-btn" onclick="openCookMode(${r.id})">&#9202; Cooking mode</button>
            <button class="action-btn print-btn" onclick="printRecipe(${r.id})">&#9113; Print</button>
          </div>
        </div>`;
      sec.appendChild(card);
    });
    el.appendChild(sec);
  });
}

render();
</script>
</body>
</html>
